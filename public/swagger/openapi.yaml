            type: string
            enum: [en_attente, en_preparation, expediee, livree, annulee]
            example: "en_attente"
        - name: search
          in: query
          required: false
          description: Recherche par nom, prénom ou email du client.
          schema:
            type: string
            example: "Jamal"
        - name: page
          in: query
          required: false
          schema:
            type: integer
            example: 1
      responses:
        '200':
          description: Liste paginée des commandes.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "success"
                  data:
                    type: object
                    properties:
                      data:
                        type: array
                        items:
                          type: object
                          properties:
                            id:
                              type: integer
                              example: 14
                            user:
                              type: object
                              properties:
                                id:
                                  type: integer
                                nom:
                                  type: string
                                prenom:
                                  type: string
                                email:
                                  type: string
                            prix_total:
                              type: number
                              example: 450.00
                            statut:
                              type: string
                              example: "en_attente"
                            livraison:
                              type: object
                              nullable: true
                              properties:
                                statut_suivi:
                                  type: string
                                  example: "assignee"
                                livreur:
                                  type: object
                                  nullable: true
                                  properties:
                                    id:
                                      type: integer
                                    nom:
                                      type: string
                                    prenom:
                                      type: string
                            created_at:
                              type: string
                              format: date-time
                      current_page:
                        type: integer
                        example: 1
                      per_page:
                        type: integer
                        example: 15
                      total:
                        type: integer
                        example: 120
        '401':
          description: Non authentifié.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
components:
  schemas:
    RegisterRequest:
      type: object
      required:
        - nom
        - prenom
        - email
        - password
        - c_password
      properties:
        nom:
          type: string
          minLength: 3
          maxLength: 255
          example: "Assab"
          description: Must be at least 3 characters. The combination of nom and prenom must be unique.
        prenom:
          type: string
          minLength: 3
          maxLength: 255
          example: "Mohamed"
        email:
          type: string
          format: email
          maxLength: 255
          example: "mohamed@example.com"
          description: Must be a valid email and unique in the users table.
        password:
          type: string
          minLength: 8
          maxLength: 255
          format: password
          description: Must contain at least one letter, one number, one symbol, and mixed case characters.
        c_password:
          type: string
          description: Must match the password field.
        telephone:
          type: string
          nullable: true
          maxLength: 20
          pattern: '^(0[0-9]{9}|\+212[0-9]{9}|\+212[0-9]{3}-[0-9]{6})$'
          example: "+212600112233"
          description: Spaces are removed before validation.
    PasswordEmailRequest:
      type: object
      required:
        - email
      properties:
        email:
          type: string
          format: email
          example: "jamal@example.com"

    PasswordUpdateRequest:
      type: object
      required:
        - email
        - token
        - password
        - c_password
      properties:
        email:
          type: string
          format: email
          example: "jamal@example.com"
        token:
          type: string
          example: "FIc64WxXBDdnkGPgnF8PzCWqZGvFCPJ1WHzfoLtMWrQ5Cb2qolDfZajGmKTMV5en"
        password:
          type: string
          format: password
          example: "NouveauMdp1!"
        c_password:
          type: string
          example: "NouveauMdp1!"
    LoginRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
          example: "mohamed@example.com"
          description: The registered email address of the user.
        password:
          type: string
          format: password
          example: "Test@1234"
          description: The user password.
   
    User:
      type: object
      properties:
        id:
          type: integer
        nom:
          type: string
        prenom:
          type: string
        email:
          type: string
        telephone:
          type: string
          nullable: true
        role:
          type: string
          enum: [client, vendeur, livreur, admin]
          default: client
        est_actif:
          type: boolean
          default: true
        email_verifie_le:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    AuthUser:
      type: object
      properties:
        id:
          type: integer
          example: 1
        nom:
          type: string
          example: "Assab"
        prenom:
          type: string
          example: "Mohamed"
        email:
          type: string
          example: "mohamed@example.com"
        role:
          type: string
          enum: [client, vendeur, livreur, admin]
          example: "client"
                
    ValidateTokenResponse:
      type: object
      properties:
        status:
          type: string
          example: "success"
        message:
          type: string
          example: "Token valide. Vous pouvez maintenant choisir un nouveau mot de passe."
        email:
          type: string
          example: "mohamed@example.com"
        token:
          type: string
          example: "aB3dEfGhIjKlMnOpQrStUvWxYz1234567890aB3dEfGhIjKlMnOpQrStUvWx"

    RegistrationSuccessResponse:
      type: object
      properties:
        status:
          type: string
          example: "success"
        message:
          type: string
          example: "Client registered successfully"
        data:
          $ref: '#/components/schemas/User'

    LoginSuccessResponse:
      type: object
      properties:
        status:
          type: string
          example: "success"
        message:
          type: string
          example: "Connexion reussie. Bienvenue Mohamed !"
        token:
          type: string
          example: "2|8cWUq8Le5p9Fl7C4oULKzPvq3mRAqP8SRkJkD9tZa0e58bd5"
        user:
          $ref: '#/components/schemas/AuthUser'

    MessageResponse:
      type: object
      properties:
        status:
          type: string
          example: "error"
        message:
          type: string
          example: "Email ou mot de passe incorrect"

    ErrorResponse:
      type: object
      properties:
        status:
          type: string
          example: "error"
        errors:
          type: object
          additionalProperties:
            type: array
            items:
              type: string
          example:
            nom: ["The combination of this Nom and Prenom already exists."]
            email: ["The email has already been taken."]
            password: ["The password field must contain at least one symbol."]

#produits et categories    
    ProduitsPaginatedResponse:
      type: object
      properties:
        status:
          type: string
          example: "success"
        data:
          type: object
          properties:
            data:
              type: array
              items:
                $ref: '#/components/schemas/Produit'
            current_page:
              type: integer
              example: 1
            per_page:
              type: integer
              example: 12
            total:
              type: integer
              example: 54

    ProduitResponse:
      type: object
      properties:
        status:
          type: string
          example: "success"
        data:
          $ref: '#/components/schemas/Produit'

    Produit:
      type: object
      properties:
        id:
          type: integer
          example: 1
        nom:
          type: string
          example: "Miel de Daghmous"
        description:
          type: string
          nullable: true
        categorie_id:
          type: integer
          example: 1
        vendeur_id:
          type: integer
          example: 1
        prix:
          type: number
          example: 350.00
        quantite_stock:
          type: integer
          example: 50
        image_url:
          type: string
          nullable: true
        statut:
          type: string
          enum: [en_attente, actif, masque]
          example: "actif"
        categorie:
          type: object
          properties:
            id:
              type: integer
            nom:
              type: string
        vendeur:
          type: object
          properties:
            id:
              type: integer
            nom:
              type: string
            prenom:
              type: string

    CategoriesResponse:
      type: object
      properties:
        status:
          type: string
          example: "success"
        data:
          type: array
          items:
            type: object
            properties:
              id:
                type: integer
                example: 1
              nom:
                type: string
                example: "Miel au détail"
              description:
                type: string
                nullable: true
              produits_count:
                type: integer
                example: 7
#panier
    AddToCartRequest:
      type: object
      required:
        - produit_id
        - quantite
      properties:
        produit_id:
          type: integer
          example: 1
        quantite:
          type: integer
          minimum: 1
          example: 2

    UpdateCartRequest:
      type: object
      required:
        - article_id
        - quantite
      properties:
        article_id:
          type: integer
          example: 1
        quantite:
          type: integer
          minimum: 1
          example: 3 

     #Adresses
    AdresseRequest:
      type: object
      required:
        - rue
        - ville
        - code_postal
      properties:
        rue:
          type: string
          example: "123 Rue Mohammed V"
        ville:
          type: string
          example: "Casablanca"
        code_postal:
          type: string
          example: "20000"
        est_par_defaut:
          type: boolean
          example: true 
    
    #AVIS
    AvisRequest:
      type: object
      required:
        - note
      properties:
        note:
          type: integer
          minimum: 1
          maximum: 5
          example: 5
        commentaire:
          type: string
          maxLength: 500
          nullable: true
          example: "Excellent produit, je recommande !"
    

    UpdateDeliveryStatusRequest:
      type: object
      required:
        - statut
      properties:
        statut:
          type: string
          enum: [recuperee, en_cours, non_livree]
          example: "en_cours"

    SellerProductRequest:
      type: object
      required:
        - nom
        - categorie_id
        - prix
        - quantite_stock
      properties:
        nom:
          type: string
          example: "Miel de Thym"
        description:
          type: string
          nullable: true
          example: "Miel de thym pur du Rif"
        categorie_id:
          type: integer
          example: 1
        prix:
          type: number
          example: 120.00
        quantite_stock:
          type: integer
          example: 30
        image_url:
          type: string
          nullable: true
          example: "https://i.ibb.co/xxx/miel.jpg"

    UpdateOrderStatusRequest:
      type: object
      required:
        - statut
      properties:
        statut:
          type: string
          enum: [en_attente, en_preparation, expediee, annulee]
          example: "en_preparation"
                
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    
   