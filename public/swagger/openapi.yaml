            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'

  /deliveries/{id}/status:
    patch:
      summary: Mettre à jour le statut de livraison
      description: Met à jour le statut d'une livraison — recuperee, en_cours ou non_livree.
      operationId: updateDeliveryStatus
      tags:
        - Livreur
      security:
        - bearerAuth: []
