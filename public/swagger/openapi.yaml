              statut: "en_cours"
      responses:
        '200':
          description: Statut mis à jour.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '404':
          description: Livraison introuvable.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '422':
          description: Validation error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /deliveries/{id}/confirm:
    post:
      summary: Confirmer la livraison au client
      description: Marque la livraison comme livrée et met à jour la commande associée.
      operationId: confirmDelivery
      tags:
        - Livreur
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: L'ID de la livraison.
          schema:
            type: integer
            example: 1
      responses:
        '200':
          description: Livraison confirmée.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
              example:
                status: "success"
                message: "Livraison confirmée avec succès."
        '404':
          description: Livraison introuvable.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'

  /deliveries/history:
    get:
      summary: Historique des tournées
      description: Retourne l'historique des livraisons effectuées par le livreur connecté. Filtrable par période.
      operationId: getDeliveryHistory
      tags:
        - Livreur
      security:
        - bearerAuth: []
      parameters:
        - name: period
          in: query
          required: false
          description: Période de filtrage.
          schema:
            type: string
            enum: [today, week, month, last_month]
            example: "month"
      responses:
        '200':
          description: Historique des livraisons.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "success"
                  data:
                    type: object
                    properties:
                      livraisons:
                        type: array
                        items:
                          $ref: '#/components/schemas/MessageResponse'
                      total:
                        type: integer
                        example: 15
  
