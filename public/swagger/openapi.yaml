  /admin/commandes/{id}/assigner-livreur:
    post:
      summary: Assigner un livreur à une commande
      description: Permet à l'admin d'assigner un livreur à une commande existante. Crée une entrée dans la table livraisons et passe le statut de la commande à "en_preparation".
      operationId: assignerLivreur
      tags:
        - Admin
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: L'ID de la commande.
          schema:
            type: integer
            example: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - livreur_id
              properties:
                livreur_id:
                  type: integer
                  example: 5
            example:
              livreur_id: 5
      responses:
        '200':
          description: Livreur assigné avec succès.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "success"
                  message:
                    type: string
                    example: "Livreur assigné avec succès"
                  data:
                    type: object
                    properties:
                      id:
                        type: integer
                        example: 1
                      commande_id:
                        type: integer
                        example: 1
                      livreur_id:
                        type: integer
                        example: 5
                      statut_suivi:
                        type: string
                        example: "assignee"
                      disponibilite:
                        type: boolean
                        example: true
                      created_at:
                        type: string
                        format: date-time
                      updated_at:
                        type: string
                        format: date-time
        '404':
          description: Commande ou livreur introuvable.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "error"
                  message:
                    type: string
                    example: "Commande introuvable"
        '409':
          description: Un livreur est déjà assigné à cette commande.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "error"
                  message:
                    type: string
                    example: "Cette commande possède déjà une livraison"
        '422':
          description: Validation error.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "error"
                  errors:
                    type: object
                    example:
                      livreur_id: ["The livreur id field is required."]
        '401':
          description: Non authentifié.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Unauthenticated."
        '403':
          description: Accès refusé (non admin).
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Accès refusé."

  # ========== ADMIN ==========

  /admin/stats:
    get:
      summary: Statistiques globales
