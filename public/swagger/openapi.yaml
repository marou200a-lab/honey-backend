            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "success"
                  data:
                    type: object
                    properties:
                      chiffre_affaires:
                        type: number
                        example: 45800.00
                      total_commandes:
                        type: integer
                        example: 120
                      commandes_par_statut:
                        type: object
                        example:
                          en_attente: { statut: "en_attente", total: 10 }
                          livree: { statut: "livree", total: 85 }
                      users_par_role:
                        type: object
                        example:
                          client: { role: "client", total: 95 }
                          vendeur: { role: "vendeur", total: 8 }
                          livreur: { role: "livreur", total: 5 }
                      produits_par_statut:
                        type: object
                        example:
                          actif: { statut: "actif", total: 48 }
                          en_attente: { statut: "en_attente", total: 6 }
                      ventes_par_mois:
                        type: array
                        items:
                          type: object
                          properties:
                            mois:
                              type: string
                              example: "2025-04"
                            total:
                              type: number
                              example: 5200.00
                            nb_commandes:
                              type: integer
                              example: 14
                      top_produits:
                        type: array
                        items:
                          type: object
                          properties:
                            id:
                              type: integer
                              example: 3
                            nom:
                              type: string
                              example: "Miel de Jujubier"
                            image_url:
                              type: string
                              nullable: true
                            total_vendu:
                              type: integer
                              example: 210
                            chiffre_affaires:
                              type: number
                              example: 73500.00
                      livreurs_disponibles:
                        type: array
                        items:
                          type: object
                          properties:
                            id:
                              type: integer
                              example: 7
